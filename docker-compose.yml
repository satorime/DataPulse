version: '3.8'

services:
  dotnet-api:
    build: ./dotnet-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - Jwt__Key=${JWT_SECRET:?JWT_SECRET is required}
      - Jwt__Issuer=DataPulseAPI
      - Jwt__Audience=DataPulseClient
      - ASPNETCORE_ENVIRONMENT=Development

  django-api:
    build: ./django-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=DataPulseAPI
      - JWT_AUDIENCE=DataPulseClient
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=True

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - dotnet-api
      - django-api
