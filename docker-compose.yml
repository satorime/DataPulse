version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: datapulse
      POSTGRES_USER: datapulse
      POSTGRES_PASSWORD: datapulse_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  dotnet-api:
    build: ./dotnet-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=datapulse;Username=datapulse;Password=datapulse_password
      - Jwt__Key=super-secret-jwt-key-change-in-production-32chars
      - Jwt__Issuer=DataPulseAPI
      - Jwt__Audience=DataPulseClient
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy

  django-api:
    build: ./django-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://datapulse:datapulse_password@postgres:5432/datapulse
      - JWT_SECRET=super-secret-jwt-key-change-in-production-32chars
      - JWT_ISSUER=DataPulseAPI
      - JWT_AUDIENCE=DataPulseClient
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - dotnet-api
      - django-api

volumes:
  postgres_data:
